slides_root: /data1/lowes/ratnayn/Data/CellDive_analysis_data/work
instanseg_env: instanseg
nimbus_env: nimbus

slides:
  SLIDE-0272:
    slide_dir: /data1/lowes/ratnayn/Data/CellDive_analysis_data/work/SLIDE-0272
    pixel_size_um: 0.325

    # Preferred explicit mapping source (can be generated via `mif-pipeline setup`)
    channel_map_file: /workspace/mIF-pipeline/channel_map.example.json

    # Optional setup phase to auto-generate starting mapping from a folder.
    setup:
      channel_source_dir: /data1/lowes/ratnayn/Data/CellDive_analysis_data/image_data/SLIDE-0272
      channel_patterns: ["*.tif"]
      channel_map_output: /data1/lowes/ratnayn/Data/CellDive_analysis_data/work/SLIDE-0272/channel_map.generated.json

    seg_merge:
      enabled: true
      channels: [R0_DAPI, R0_PANCK, R0_CD45]
      ome_path: /data1/lowes/ratnayn/Data/CellDive_analysis_data/work/SLIDE-0272/SLIDE-0272_segment_merge.ome.tif
      compression: zlib
      tile: [256, 256]
      bigtiff: true

    full_merge:
      enabled: true
      channels: [R0_DAPI, R0_PANCK, R0_CD45]
      ome_path: /data1/lowes/ratnayn/Data/CellDive_analysis_data/work/SLIDE-0272/SLIDE-0272_full_merge.ome.tif
      compression: zlib
      tile: [256, 256]
      bigtiff: true

    instanseg:
      model: fluorescence_nuclei_and_cells
      prediction_tag: _instanseg_prediction
      tile_size: 2048
      overlap: 100
      resolve_cell_and_nucleus: true
      cleanup_fragments: true
      seed_threshold: 0.6
      planes:
        nuclei_plane: 0
        cells_plane: 1

    mask_export:
      mask_dir: /data1/lowes/ratnayn/Data/CellDive_analysis_data/work/SLIDE-0272/masks_whole_cell
      suffix: _whole_cell.tiff
      nuclear_suffix: _nuclear.tiff
      bigtiff: true
      compression: zlib
      tile: [256, 256]

    nimbus:
      enabled: true
      image_paths: []
      image_globs:
        - /data1/lowes/ratnayn/Data/CellDive_analysis_data/image_data/SLIDE-0272/*.tif
      image_root: null
      image_extensions: ["*.tif", "*.tiff", "*.ome.tiff"]

      output_dir: /data1/lowes/ratnayn/Data/CellDive_analysis_data/work/SLIDE-0272/nimbus
      # Aliases should match setup-generated channel_map aliases (e.g., R0_DAPI).
      channels: [R0_DAPI, R0_PANCK, R0_CD45]
      channel_chunk_size: 1
      join_keys: [fov, cell_id]
      batch_size: 16
      save_predictions: true

      quantile: 0.999
      n_subset: 50
      clip_values: [0, 2]
      multiprocessing: true
