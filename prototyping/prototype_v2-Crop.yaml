# Shared defaults applied to each slide unless that slide overrides them.
pixel_size_um: 0.325

setup:
  channel_patterns: ["*.tif", "*.tiff", "*.ome.tif", "*.ome.tiff"]
  channel_map_output: channel_map.generated.json
  include_round_in_alias: true

full_merge:
  enabled: true
  exclude_channels: []
  suffix: _full.ome.tif
  compression: zlib
  tile: [256, 256]
  bigtiff: true

instanseg:
  channels: [R1_DAPI, R1_FITC_AF, R4_P19_POLYRAT, R4_ANXA10_647, R4_LGALS4_750]
  model: fluorescence_nuclei_and_cells
  mode: medium
  prediction_tag: _instanseg_prediction
  tile_size: 1000
  overlap: 100
  batch_size: 1
  resolve_cell_and_nucleus: true
  cleanup_fragments: true
  seed_threshold: 0.6
  planes:
    nuclei_plane: 0
    cells_plane: 1

mask_export:
  mask_dir: masks
  suffix: _whole_cell.tiff
  nuclear_suffix: _nuclear.tiff
  bigtiff: true
  compression: zlib
  tile: [256, 256]

nimbus:
  enabled: true
  output_dir: nimbus
  # Use either channels or exclude_channels. Aliases should match
  # setup-generated channel_map aliases.
  channels: [R1_DAPI, R4_GFP_POLY_AF488, R4_P19_POLYRAT, R4_ANXA10_647]
  # exclude_channels: []
  channel_chunk_size: 1
  join_keys: [fov, cell_id]
  batch_size: 16
  save_predictions: true
  compile_model: false
  quantile: 0.999
  n_subset: 50
  clip_values: [0, 2]
  multiprocessing: true
  multislide:
    enabled: true
    output_dir: /mnt/c/analysis/Data_prototype/crop_nimbus_multislide
    per_slide_output_dirname: per_slide
    slide_ids: [SLIDE-0329_crop_2048, SLIDE-0329_crop_2048_2]

spatialdata:
  enabled: true
  suffix: _spatialdata.sdata.zarr
  aggregate: true
  aggregate_cell_labels: true
  aggregate_nuclear_labels: true
  run_on_gpu: false
  dask_scheduler: processes
  derive_shapes: true
  load_nimbus: true
  # This final assembly stage is intended for a modern Harpy + SpatialData env
  # after merge / InstanSeg / optional Nimbus artifacts already exist.

slides:
  SLIDE-0329_crop_2048:
    slide_dir: /mnt/c/analysis/Data_prototype/SLIDE-0329_crop_2048
    output_dir: /mnt/c/analysis/Data_prototype/SLIDE-0329_crop_2048/pipeline_outputs
    channel_map_file: channel_map.generated.json

  SLIDE-0329_crop_2048_2:
    slide_dir: /mnt/c/analysis/Data_prototype/SLIDE-0329_crop_2048_2
    output_dir: /mnt/c/analysis/Data_prototype/SLIDE-0329_crop_2048_2/pipeline_outputs
    channel_map_file: channel_map.generated.json
